<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mc-keygen</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d1117; color: #c9d1d9; }
      a { color: #58a6ff; text-decoration: none; }
      button { cursor: pointer; }
      input, select, textarea { background: #161b22; border: 1px solid #30363d; color: #c9d1d9; padding: 8px 12px; border-radius: 6px; font-size: 14px; }
      button { background: #238636; color: white; border: none; padding: 8px 16px; border-radius: 6px; font-size: 14px; }
      button:hover { background: #2ea043; }
      button:disabled { background: #30363d; color: #484f58; cursor: not-allowed; }
      button.danger { background: #da3633; }
      button.danger:hover { background: #f85149; }
      table { width: 100%; border-collapse: collapse; }
      th, td { text-align: left; padding: 8px 12px; border-bottom: 1px solid #21262d; }
      th { color: #8b949e; font-weight: 600; font-size: 12px; text-transform: uppercase; }
      .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
