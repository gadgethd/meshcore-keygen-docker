services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    image: meshcore-keygen-dev:latest
    working_dir: /build
    volumes:
      - .:/build
      - cargo-cache:/usr/local/cargo/registry
    environment:
      - RUST_LOG=debug
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: ["cargo", "test"]

volumes:
  cargo-cache:
